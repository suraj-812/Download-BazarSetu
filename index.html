<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download BazarSetu | Empowering Local Commerce</title>
    <meta name="description" content="Download the latest version of the BazarSetu app. Join the local commerce revolution with ease.">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #05070a;
            --accent-color: #f57c20;
            --accent-hover: #ff8c3a;
            --text-primary: #ffffff;
            --text-secondary: #a1a1a1;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(245, 124, 32, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(245, 124, 32, 0.03) 0%, transparent 40%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 3rem 2rem;
            max-width: 480px;
            width: 90%;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-container {
            margin-bottom: 2rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .logo-circle {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, var(--accent-color), #ff9d5c);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(245, 124, 32, 0.3);
            margin-bottom: 1.5rem;
        }

        .logo-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 20px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            letter-spacing: -0.03em;
            background: linear-gradient(to bottom, #fff, #ccc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-secondary);
            margin-bottom: 2.5rem;
            font-size: 1.1rem;
            max-width: 320px;
            margin-left: auto;
            margin-right: auto;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: var(--accent-color);
            color: white;
            text-decoration: none;
            padding: 1.25rem 2.5rem;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: var(--transition);
            box-shadow: 0 15px 30px rgba(245, 124, 32, 0.25);
            border: none;
            cursor: pointer;
            width: 100%;
        }

        .download-btn:hover {
            background-color: var(--accent-hover);
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 20px 40px rgba(245, 124, 32, 0.35);
        }

        .download-btn:active {
            transform: translateY(-1px);
        }

        .download-btn svg {
            margin-right: 12px;
            width: 22px;
            height: 22px;
        }

        .footer-note {
            margin-top: 2.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--card-border);
            font-size: 0.85rem;
            color: var(--text-secondary);
            display: flex;
            justify-content: center;
            gap: 1.5rem;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #10b981;
            background: rgba(16, 185, 129, 0.1);
            padding: 4px 12px;
            border-radius: 20px;
            margin-bottom: 1.5rem;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 10px #10b981;
        }

        /* Decorative Background Elements */
        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--accent-color);
            filter: blur(150px);
            opacity: 0.1;
            z-index: -1;
            border-radius: 50%;
        }

        .glow-1 { top: -100px; left: -100px; }
        .glow-2 { bottom: -100px; right: -100px; }

        @media (max-width: 480px) {
            h1 { font-size: 2rem; }
            .container { padding: 2.5rem 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>

        <div class="logo-container">
            <div class="logo-circle">
                <img src="logo.png" alt="BazarSetu Logo">
            </div>
        </div>

        <div class="status-badge">
            <img src="logo.png" alt="Logo" style="width: 16px; height: 16px; border-radius: 4px;">
            <div class="status-dot"></div>
            Latest Version v1.0.4
        </div>

        <h1>Download BazarSetu</h1>
        <p>Empowering local commerce through a professional and seamless mobile experience.</p>

        <a href="bazarsetu.apk" class="download-btn" download>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            Download APK
        </a>

        <div class="footer-note">
            <span>Size: 79.3 MB</span>
            <span>OS: Android 8.0+</span>
        </div>
    </div>

</body>
</html>
